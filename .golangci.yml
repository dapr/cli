version: "2"
run:
  concurrency: 4
  issues-exit-code: 1
  tests: true
output:
  formats:
    tab:
      path: stdout
      print-linter-name: true
      colors: false
linters:
  disable:
    - asasalint
    - canonicalheader
    - containedctx
    - contextcheck
    - cyclop
    - dupl
    - err113
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - exhaustruct
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - godot
    - godox
    - gomoddirectives
    - inamedparam
    - ireturn
    - lll
    - maintidx
    - mnd
    - musttag
    - nestif
    - nilnil
    - nlreturn
    - noctx
    - nonamedreturns
    - paralleltest
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - tagalign
    - tagliatelle
    - testpackage
    - thelper
    - tparallel
    - unparam
    - varnamelen
    - wastedassign
    - wrapcheck
    - wsl
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/Sirupsen/logrus
              desc: must use github.com/sirupsen/logrus
    dogsled:
      max-blank-identifiers: 2
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 10
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - regexpMust
        - rangeValCopy
        - hugeParam
        - ifElseChain
        - singleCaseSwitch
        - exitAfterDefer
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
    gocyclo:
      min-complexity: 10
    godot:
      scope: all
      exclude:
        - nosec
      capital: false
    godox:
      keywords:
        - NOTE
        - OPTIMIZE
        - HACK
    govet:
      enable:
        - atomicalign
        - shadow
      enable-all: false
      disable-all: false
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
            - github.com/dapr/cli/pkg/print.FailureStatusEvent
            - github.com/dapr/cli/pkg/print.SuccessStatusEvent
            - github.com/dapr/cli/pkg/print.WarningStatusEvent
            - github.com/dapr/cli/pkg/print.InfoStatusEvent
            - github.com/dapr/cli/pkg/print.StatusEvent
            - github.com/dapr/cli/pkg/print.Spinner
    lll:
      line-length: 120
      tab-width: 1
    misspell:
      ignore-rules:
        - someword
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    revive:
      confidence: 0.8
    testifylint:
      disable:
        - require-error
    unparam:
      check-exported: false
    unused:
      exported-fields-are-used: false
    whitespace:
      multi-if: false
      multi-func: false
    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      allow-cuddle-declarations: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^pkg.*client.*clientset.*versioned.*
      - ^pkg.*client.*informers.*externalversions.*
      - pkg.*mod.*k8s.io.*
      - third_party$
      - builtin$
      - examples$
formatters:
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/dapr/
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
